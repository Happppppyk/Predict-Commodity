  v2_interview:
    description: |
      인터뷰 반영 버전 (2026).
       - DXY 달러인덱스 추가 (BRL 대신 핵심 환율 지표)
       - 대체 유지류 추가 (카놀라, 해바라기유)
       - EIA 바이오디젤 추가 (RVO 정책 효과 반영)
       - 시장평균 벤치마크 추가 (Reward 함수 기준)
       - 타깃 t28 추가 (현업 의사결정 주기 1~1.5개월 반영)
       - usd_brl은 보조 변수로 유지
